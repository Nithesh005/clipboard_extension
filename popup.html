<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipboard Manager</title>
    <style>
        :root {
            --bg-base: #f8fafc;
            --bg-elevated: #ffffff;
            --bg-surface: #ffffff;
            --bg-hover: #f1f5f9;
            --bg-code: #f1f5f9;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-glow: rgba(37, 99, 235, 0.14);
            --success: #16a34a;
            --danger: #dc2626;
            --danger-bg: rgba(220, 38, 38, 0.08);
            --tag-bg: #eff6ff;
            --tag-text: #1d4ed8;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --shadow: 0 4px 20px rgba(15, 23, 42, 0.1);
            --font-sans: "Segoe UI", system-ui, -apple-system, sans-serif;
            --font-mono: "Cascadia Code", "Consolas", "JetBrains Mono", ui-monospace, monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 400px;
            min-height: 520px;
            max-height: 580px;
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 13px;
            line-height: 1.5;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 16px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-elevated);
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent), #6366f1);
            display: grid;
            place-items: center;
            flex-shrink: 0;
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        .brand-icon svg {
            width: 16px;
            height: 16px;
            color: white;
        }

        .brand-text h1 {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .brand-text span {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            flex-shrink: 0;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #statusMessage {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .btn-header {
            padding: 4px 10px;
            font-size: 11px;
        }

        /* ── Search (fixed bottom) ── */
        .search-bar {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-elevated);
            flex-shrink: 0;
            box-shadow: 0 -4px 16px rgba(15, 23, 42, 0.06);
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 11px;
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
        }

        .search-icon svg {
            width: 15px;
            height: 15px;
        }

        .search-wrapper input {
            width: 100%;
            padding: 9px 36px 9px 34px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 13px;
            font-family: var(--font-sans);
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .search-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .search-wrapper input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-clear {
            position: absolute;
            right: 6px;
            width: 26px;
            height: 26px;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: background 0.15s, color 0.15s;
        }

        .search-clear:hover {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        .search-clear svg {
            width: 14px;
            height: 14px;
        }

        /* ── Save panel (fixed top) ── */
        .save-panel {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-elevated);
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(15, 23, 42, 0.05);
        }

        .save-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .save-row input {
            flex: 1;
            padding: 9px 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 13px;
            font-family: var(--font-sans);
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .save-row input::placeholder {
            color: var(--text-muted);
        }

        .save-row input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 600;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            white-space: nowrap;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            padding: 9px 16px;
            background: var(--accent);
            color: white;
            box-shadow: 0 1px 8px var(--accent-glow);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-ghost {
            padding: 7px 12px;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-hover);
            color: var(--text-secondary);
            border-color: var(--border-strong);
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px 16px;
            position: relative;
        }

        .list-container::-webkit-scrollbar {
            width: 5px;
        }

        .list-container::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 999px;
        }

        .group-heading {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            padding: 8px 2px 6px;
            margin-top: 4px;
        }

        .group-heading:first-child {
            margin-top: 0;
        }

        .clipboard-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .clipboard-item {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 12px;
            transition: border-color 0.15s, background 0.15s;
            position: relative;
        }

        .clipboard-item:hover {
            border-color: var(--border-strong);
            background: var(--bg-hover);
        }

        .clipboard-item::before {
            content: "";
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .clipboard-item:hover::before {
            opacity: 1;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .item-meta {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .item-id {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-code);
            border: 1px solid var(--border);
            padding: 4px 9px;
            border-radius: var(--radius-sm);
            flex-shrink: 0;
            letter-spacing: 0.04em;
        }

        .item-text {
            font-family: var(--font-mono);
            font-size: 11.5px;
            line-height: 1.55;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            max-height: 72px;
            overflow: hidden;
            position: relative;
        }

        .item-text::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 24px;
            background: linear-gradient(transparent, var(--bg-code));
            pointer-events: none;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }

        .tag-chip {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: var(--radius-sm);
            background: var(--tag-bg);
            color: var(--tag-text);
            cursor: pointer;
            transition: background 0.15s;
            letter-spacing: 0.02em;
        }

        .tag-chip:hover {
            background: #dbeafe;
        }

        .action-row {
            display: flex;
            gap: 4px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .icon-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 7px 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-base);
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .icon-btn svg {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-strong);
        }

        .icon-btn.copied {
            color: var(--success);
            border-color: rgba(34, 197, 94, 0.3);
            background: rgba(34, 197, 94, 0.08);
        }

        .icon-btn.danger:hover {
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.3);
            background: var(--danger-bg);
        }

        /* ── Empty state ── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }

        .empty-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-lg);
            background: var(--bg-surface);
            border: 1px solid var(--border);
            display: grid;
            place-items: center;
            margin-bottom: 14px;
        }

        .empty-icon svg {
            width: 22px;
            height: 22px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .empty-state p {
            font-size: 12px;
            line-height: 1.5;
            max-width: 240px;
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            width: 100%;
            max-height: 85%;
            background: var(--bg-elevated);
            border-top: 1px solid var(--border-strong);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .modal-header h2 {
            font-size: 13px;
            font-weight: 600;
        }

        .modal-close {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--bg-surface);
            color: var(--text-muted);
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: background 0.15s, color 0.15s;
        }

        .modal-close:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 16px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .modal-meta span {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
        }

        .modal-content {
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px;
        }

        .modal-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .modal-footer .btn {
            flex: 1;
            padding: 10px;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 72px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 500;
            box-shadow: var(--shadow);
            z-index: 200;
            opacity: 0;
            transition: transform 0.25s ease, opacity 0.25s ease;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .watermark {
            font-size: 9px;
            color: var(--text-muted);
            opacity: 0.42;
            letter-spacing: 0.02em;
            line-height: 1;
        }

        .watermark a {
            color: inherit;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.15s, color 0.15s;
        }

        .watermark a:hover {
            opacity: 1;
            color: var(--accent);
        }
    </style>
</head>

<body>

    <header class="app-header">
        <div class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                </svg>
            </div>
            <div class="brand-text">
                <h1>Clipboard Manager</h1>
                <span>Developer snippets</span>
            </div>
        </div>
        <div class="header-right">
            <p class="watermark">😊 developed by <a href="https://nithi.shop" target="_blank" rel="noopener noreferrer">nithi</a></p>
            <div class="header-actions">
                <span id="statusMessage">Loading…</span>
                <button id="clearHistoryBtn" class="btn btn-ghost btn-header">Clear all</button>
            </div>
        </div>
    </header>

    <div class="save-panel">
        <div class="save-row">
            <input id="itemTags" type="text" placeholder="Add tags (comma separated) — press Enter to save">
            <button id="btn" class="btn btn-primary">Save</button>
        </div>
    </div>

    <div class="list-container">
        <div id="clipboardList" class="clipboard-list"></div>
    </div>

    <div class="search-bar">
        <div class="search-wrapper">
            <span class="search-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
            </span>
            <input id="searchInput" type="search" placeholder="Search tags, ID, or content…" autocomplete="off">
            <button id="searchClear" class="search-clear" aria-label="Clear search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Modal -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal" role="dialog" aria-modal="true">
            <div class="modal-header">
                <h2 id="modalTitle">Clipboard Item</h2>
                <button id="modalClose" class="modal-close" aria-label="Close">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="modalMeta" class="modal-meta"></div>
                <div id="modalContent" class="modal-content"></div>
            </div>
            <div class="modal-footer">
                <button id="modalCopy" class="btn btn-primary">Copy to clipboard</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="popup.js"></script>
</body>

</html>
